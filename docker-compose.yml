# docker-compose.yml — services filled in across Phases 1, 5, and 7
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: company_intel
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    env_file:
      - ./api/.env
    environment:
      # docker-internal overrides — these win over api/.env when running in compose
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/company_intel
      CORS_ORIGINS: http://localhost:5173
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }

  ui:
    build:
      context: ./ui
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports: ["5173:80"]
    depends_on: [api]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/config.yml:ro
    command: ["--config.file=/etc/prometheus/config.yml"]
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports: ["3000:3000"]
    depends_on: [prometheus]

volumes:
  postgres-data:
  grafana-data:
